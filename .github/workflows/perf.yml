name: Run Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Select the performance scenario to run"
        required: true
        default: "hot_read"
        type: choice
        options:
          - hot_read
          - write_conflict
          - cache_penetration
          - cache_breakdown
      users:
        description: "Optional override for total Locust users"
        required: false
        default: ""
      rate:
        description: "Optional override for spawn rate per second"
        required: false
        default: ""
      duration:
        description: "Optional override for duration (for example 6m)"
        required: false
        default: ""
      wait_min_seconds:
        description: "Optional override for per-user minimum wait time"
        required: false
        default: ""
      wait_max_seconds:
        description: "Optional override for per-user maximum wait time"
        required: false
        default: ""

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Choose scenario profile
        shell: bash
        run: |
          scenario="${{ inputs.scenario }}"
          case "$scenario" in
            hot_read)
              echo "PERF_LOCUST_FILE=perf/locust_hot_read.py" >> "$GITHUB_ENV"
              echo "PERF_THRESHOLD_PROFILE=hot_read" >> "$GITHUB_ENV"
              echo "PERF_USERS=120" >> "$GITHUB_ENV"
              echo "PERF_RATE=20" >> "$GITHUB_ENV"
              echo "PERF_DURATION=6m" >> "$GITHUB_ENV"
              echo "PERF_DURATION_SECONDS=360" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MIN_SECONDS=0.01" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MAX_SECONDS=0.05" >> "$GITHUB_ENV"
              echo "LOCUST_DASHBOARD_COUNT=20" >> "$GITHUB_ENV"
              echo "LOCUST_SUBSCRIPTIONS_PER_DASHBOARD=20" >> "$GITHUB_ENV"
              ;;
            write_conflict)
              echo "PERF_LOCUST_FILE=perf/locust_write_conflict.py" >> "$GITHUB_ENV"
              echo "PERF_THRESHOLD_PROFILE=write_conflict" >> "$GITHUB_ENV"
              echo "PERF_USERS=80" >> "$GITHUB_ENV"
              echo "PERF_RATE=12" >> "$GITHUB_ENV"
              echo "PERF_DURATION=5m" >> "$GITHUB_ENV"
              echo "PERF_DURATION_SECONDS=300" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MIN_SECONDS=0.01" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MAX_SECONDS=0.04" >> "$GITHUB_ENV"
              echo "LOCUST_DASHBOARD_COUNT=10" >> "$GITHUB_ENV"
              echo "LOCUST_SUBSCRIPTIONS_PER_DASHBOARD=5" >> "$GITHUB_ENV"
              ;;
            cache_penetration)
              echo "PERF_LOCUST_FILE=perf/locust_cache_penetration.py" >> "$GITHUB_ENV"
              echo "PERF_THRESHOLD_PROFILE=cache_penetration" >> "$GITHUB_ENV"
              echo "PERF_USERS=100" >> "$GITHUB_ENV"
              echo "PERF_RATE=18" >> "$GITHUB_ENV"
              echo "PERF_DURATION=4m" >> "$GITHUB_ENV"
              echo "PERF_DURATION_SECONDS=240" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MIN_SECONDS=0.00" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MAX_SECONDS=0.03" >> "$GITHUB_ENV"
              echo "LOCUST_DASHBOARD_COUNT=5" >> "$GITHUB_ENV"
              echo "LOCUST_SUBSCRIPTIONS_PER_DASHBOARD=3" >> "$GITHUB_ENV"
              ;;
            cache_breakdown)
              echo "PERF_LOCUST_FILE=perf/locust_cache_breakdown.py" >> "$GITHUB_ENV"
              echo "PERF_THRESHOLD_PROFILE=cache_breakdown" >> "$GITHUB_ENV"
              echo "PERF_USERS=150" >> "$GITHUB_ENV"
              echo "PERF_RATE=30" >> "$GITHUB_ENV"
              echo "PERF_DURATION=3m" >> "$GITHUB_ENV"
              echo "PERF_DURATION_SECONDS=180" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MIN_SECONDS=0.00" >> "$GITHUB_ENV"
              echo "LOCUST_WAIT_MAX_SECONDS=0.01" >> "$GITHUB_ENV"
              echo "LOCUST_DASHBOARD_COUNT=5" >> "$GITHUB_ENV"
              echo "LOCUST_SUBSCRIPTIONS_PER_DASHBOARD=50" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported scenario: $scenario" >&2
              exit 1
              ;;
          esac

      - name: Apply optional overrides
        shell: bash
        run: |
          if [ -n "${{ inputs.users }}" ]; then
            echo "PERF_USERS=${{ inputs.users }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.rate }}" ]; then
            echo "PERF_RATE=${{ inputs.rate }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.duration }}" ]; then
            duration="${{ inputs.duration }}"
            echo "PERF_DURATION=$duration" >> "$GITHUB_ENV"

            if [[ "$duration" =~ ^([0-9]+)([smh])$ ]]; then
              value="${BASH_REMATCH[1]}"
              unit="${BASH_REMATCH[2]}"
              if [ "$unit" = "s" ]; then
                seconds="$value"
              elif [ "$unit" = "m" ]; then
                seconds=$((value * 60))
              else
                seconds=$((value * 3600))
              fi
              echo "PERF_DURATION_SECONDS=$seconds" >> "$GITHUB_ENV"
            else
              echo "Unsupported duration format: $duration" >&2
              exit 1
            fi
          fi

          if [ -n "${{ inputs.wait_min_seconds }}" ]; then
            echo "LOCUST_WAIT_MIN_SECONDS=${{ inputs.wait_min_seconds }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.wait_max_seconds }}" ]; then
            echo "LOCUST_WAIT_MAX_SECONDS=${{ inputs.wait_max_seconds }}" >> "$GITHUB_ENV"
          fi

      - name: Print selected profile
        shell: bash
        run: |
          echo "scenario=${{ inputs.scenario }}"
          echo "PERF_LOCUST_FILE=$PERF_LOCUST_FILE"
          echo "PERF_THRESHOLD_PROFILE=$PERF_THRESHOLD_PROFILE"
          echo "PERF_USERS=$PERF_USERS"
          echo "PERF_RATE=$PERF_RATE"
          echo "PERF_DURATION=$PERF_DURATION"
          echo "PERF_DURATION_SECONDS=$PERF_DURATION_SECONDS"
          echo "LOCUST_WAIT_MIN_SECONDS=$LOCUST_WAIT_MIN_SECONDS"
          echo "LOCUST_WAIT_MAX_SECONDS=$LOCUST_WAIT_MAX_SECONDS"
          echo "LOCUST_DASHBOARD_COUNT=$LOCUST_DASHBOARD_COUNT"
          echo "LOCUST_SUBSCRIPTIONS_PER_DASHBOARD=$LOCUST_SUBSCRIPTIONS_PER_DASHBOARD"

      - name: Start required services
        shell: bash
        run: docker compose up -d --build grafana mysql redis dashboard-hub prometheus

      - name: Wait for services
        shell: bash
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health | grep -q '"database":"ok"\|"status":"ok"'; then
              echo "Grafana is ready"
              break
            fi
            echo "Waiting for Grafana... $i/60"
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Grafana did not become ready in time" >&2
              exit 1
            fi
          done

          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health | grep -q '"status":"healthy"\|"database":"healthy"\|"status":"ok"'; then
              echo "Dashboard Hub is ready"
              break
            fi
            echo "Waiting for Dashboard Hub... $i/60"
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Dashboard Hub did not become ready in time" >&2
              exit 1
            fi
          done

      - name: Create performance seed data
        env:
          GRAFANA_BASE_URL: http://localhost:3000
          DASHBOARD_HUB_BASE_URL: http://localhost:8000
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: admin
        shell: bash
        run: |
          : "${LOCUST_DASHBOARD_COUNT:?LOCUST_DASHBOARD_COUNT is required}"
          : "${LOCUST_SUBSCRIPTIONS_PER_DASHBOARD:?LOCUST_SUBSCRIPTIONS_PER_DASHBOARD is required}"
          python perf/bootstrap_perf_data.py --github-env "$GITHUB_ENV"

      - name: Validate generated seed variables
        shell: bash
        run: |
          required_common=(
            LOCUST_DASHBOARD_UIDS
            LOCUST_SHARE_TOKENS
            LOCUST_HOT_DASHBOARD_UID
            LOCUST_HOT_SHARE_TOKEN
            LOCUST_CONFLICT_USER_LOGIN
          )

          for v in "${required_common[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing generated env: $v" >&2
              exit 1
            fi
          done

          echo "LOCUST_DASHBOARD_UIDS length=${#LOCUST_DASHBOARD_UIDS}"
          echo "LOCUST_SHARE_TOKENS length=${#LOCUST_SHARE_TOKENS}"
          echo "LOCUST_HOT_DASHBOARD_UID=$LOCUST_HOT_DASHBOARD_UID"
          echo "LOCUST_HOT_SHARE_TOKEN=$LOCUST_HOT_SHARE_TOKEN"
          echo "LOCUST_CONFLICT_USER_LOGIN=$LOCUST_CONFLICT_USER_LOGIN"

      - name: Create virtual environment and install dependencies
        shell: bash
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -c "import locust, redis; print('Performance dependencies installed successfully')"

      - name: Collect metrics before load
        shell: bash
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          python perf/collect_metrics_snapshot.py \
            --metrics-url http://localhost:8000/metrics \
            --output perf-results/metrics-before.json

      - name: Start metrics sampling during load
        shell: bash
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          nohup python -m perf.sample_metrics_during_load \
            --metrics-url http://localhost:8000/metrics \
            --output perf-results/metrics-series.json \
            --interval-seconds 10 \
            --duration-seconds "$PERF_DURATION_SECONDS" \
            > perf-results/metrics-sampler.log 2>&1 &
          echo $! > perf-results/metrics-sampler.pid
          echo "Started metrics sampler with PID $(cat perf-results/metrics-sampler.pid)"

      - name: Run selected performance scenario
        env:
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB: "0"
          LOCUST_WARMUP_REQUESTS: "2"
          LOCUST_BREAKDOWN_WARMUP_REQUESTS: "2"
        shell: bash
        run: |
          . .venv/bin/activate

          required_vars=(
            PERF_LOCUST_FILE
            PERF_THRESHOLD_PROFILE
            PERF_USERS
            PERF_RATE
            PERF_DURATION
            LOCUST_WAIT_MIN_SECONDS
            LOCUST_WAIT_MAX_SECONDS
            LOCUST_DASHBOARD_UIDS
            LOCUST_SHARE_TOKENS
            LOCUST_HOT_DASHBOARD_UID
            LOCUST_HOT_SHARE_TOKEN
            LOCUST_CONFLICT_USER_LOGIN
          )

          for v in "${required_vars[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required env: $v" >&2
              exit 1
            fi
          done

          echo "PERF_LOCUST_FILE=$PERF_LOCUST_FILE"
          echo "PERF_USERS=$PERF_USERS PERF_RATE=$PERF_RATE PERF_DURATION=$PERF_DURATION"
          echo "LOCUST_WAIT_MIN_SECONDS=$LOCUST_WAIT_MIN_SECONDS"
          echo "LOCUST_WAIT_MAX_SECONDS=$LOCUST_WAIT_MAX_SECONDS"
          echo "LOCUST_DASHBOARD_UIDS length=${#LOCUST_DASHBOARD_UIDS}"
          echo "LOCUST_SHARE_TOKENS length=${#LOCUST_SHARE_TOKENS}"
          echo "LOCUST_HOT_DASHBOARD_UID=$LOCUST_HOT_DASHBOARD_UID"
          echo "LOCUST_HOT_SHARE_TOKEN=$LOCUST_HOT_SHARE_TOKEN"
          echo "LOCUST_CONFLICT_USER_LOGIN=$LOCUST_CONFLICT_USER_LOGIN"

          mkdir -p perf-results
          locust -f "$PERF_LOCUST_FILE" \
            --host http://localhost:8000 \
            --headless \
            -u "$PERF_USERS" -r "$PERF_RATE" -t "$PERF_DURATION" \
            --csv=perf-results/locust \
            --html=perf-results/locust-report.html

      - name: Wait for metrics sampler
        if: always()
        shell: bash
        run: |
          if [ -f perf-results/metrics-sampler.pid ]; then
            pid=$(cat perf-results/metrics-sampler.pid)
            if kill -0 "$pid" 2>/dev/null; then
              while kill -0 "$pid" 2>/dev/null; do
                sleep 1
              done
            fi
          fi

      - name: Collect metrics after load
        if: always()
        shell: bash
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          python perf/collect_metrics_snapshot.py \
            --metrics-url http://localhost:8000/metrics \
            --output perf-results/metrics-after.json

      - name: Assert performance thresholds
        if: always()
        shell: bash
        run: |
          . .venv/bin/activate
          python perf/assert_locust_thresholds.py \
            --csv perf-results/locust_stats.csv \
            --profile "$PERF_THRESHOLD_PROFILE"

      - name: Collect container logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p perf-results
          docker compose logs > perf-results/docker-compose.log || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ inputs.scenario }}
          path: perf-results

      - name: Cleanup
        if: always()
        shell: bash
        run: docker compose down -v --remove-orphans || true
