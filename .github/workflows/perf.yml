name: Run Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Select the performance scenario to run
        required: true
        default: hot_read
        type: choice
        options:
          - hot_read
          - write_conflict
          - cache_penetration
          - cache_breakdown

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Choose scenario profile
        run: |
          scenario='${{ inputs.scenario }}'
          case "$scenario" in
            hot_read)
              echo 'PERF_LOCUST_FILE=perf/locust_hot_read.py' >> "$GITHUB_ENV"
              echo 'PERF_THRESHOLD_PROFILE=hot_read' >> "$GITHUB_ENV"
              echo 'PERF_USERS=40' >> "$GITHUB_ENV"
              echo 'PERF_RATE=8' >> "$GITHUB_ENV"
              echo 'PERF_DURATION=4m' >> "$GITHUB_ENV"
              echo 'PERF_DURATION_SECONDS=240' >> "$GITHUB_ENV"
              ;;
            write_conflict)
              echo 'PERF_LOCUST_FILE=perf/locust_write_conflict.py' >> "$GITHUB_ENV"
              echo 'PERF_THRESHOLD_PROFILE=write_conflict' >> "$GITHUB_ENV"
              echo 'PERF_USERS=25' >> "$GITHUB_ENV"
              echo 'PERF_RATE=5' >> "$GITHUB_ENV"
              echo 'PERF_DURATION=4m' >> "$GITHUB_ENV"
              echo 'PERF_DURATION_SECONDS=240' >> "$GITHUB_ENV"
              ;;
            cache_penetration)
              echo 'PERF_LOCUST_FILE=perf/locust_cache_penetration.py' >> "$GITHUB_ENV"
              echo 'PERF_THRESHOLD_PROFILE=cache_penetration' >> "$GITHUB_ENV"
              echo 'PERF_USERS=30' >> "$GITHUB_ENV"
              echo 'PERF_RATE=6' >> "$GITHUB_ENV"
              echo 'PERF_DURATION=3m' >> "$GITHUB_ENV"
              echo 'PERF_DURATION_SECONDS=180' >> "$GITHUB_ENV"
              ;;
            cache_breakdown)
              echo 'PERF_LOCUST_FILE=perf/locust_cache_breakdown.py' >> "$GITHUB_ENV"
              echo 'PERF_THRESHOLD_PROFILE=cache_breakdown' >> "$GITHUB_ENV"
              echo 'PERF_USERS=50' >> "$GITHUB_ENV"
              echo 'PERF_RATE=10' >> "$GITHUB_ENV"
              echo 'PERF_DURATION=2m' >> "$GITHUB_ENV"
              echo 'PERF_DURATION_SECONDS=120' >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported scenario: $scenario" >&2
              exit 1
              ;;
          esac

      - name: Start required services
        run: docker compose up -d --build grafana mysql redis dashboard-hub prometheus

      - name: Wait for services
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          endpoints = [
              ('Grafana', 'http://localhost:3000/api/health'),
              ('Dashboard Hub', 'http://localhost:8000/health'),
          ]

          for name, url in endpoints:
              for attempt in range(60):
                  try:
                      with urllib.request.urlopen(url, timeout=3) as response:
                          payload = json.loads(response.read().decode('utf-8'))
                          status = payload.get('status') or payload.get('database')
                          if status in ('ok', 'healthy'):
                              print(f'{name} is ready')
                              break
                  except Exception as exc:
                      print(f'Waiting for {name}... attempt {attempt + 1}/60: {exc}')
                  time.sleep(2)
              else:
                  raise SystemExit(f'{name} did not become ready in time')
          PY

      - name: Create performance seed data
        env:
          GRAFANA_BASE_URL: http://localhost:3000
          DASHBOARD_HUB_BASE_URL: http://localhost:8000
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: admin
          LOCUST_DASHBOARD_COUNT: 5
          LOCUST_SUBSCRIPTIONS_PER_DASHBOARD: 3
        run: python perf/bootstrap_perf_data.py --github-env "$GITHUB_ENV"

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python - <<'PY'
          import locust
          import redis
          print('Performance dependencies installed successfully')
          PY

      - name: Collect metrics before load
        run: |
          mkdir -p perf-results
          python perf/collect_metrics_snapshot.py             --metrics-url http://localhost:8000/metrics             --output perf-results/metrics-before.json

      - name: Start metrics sampling during load
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          nohup python perf/sample_metrics_during_load.py             --metrics-url http://localhost:8000/metrics             --output perf-results/metrics-series.json             --interval-seconds 10             --duration-seconds "$PERF_DURATION_SECONDS"             > perf-results/metrics-sampler.log 2>&1 &
          echo $! > perf-results/metrics-sampler.pid

      - name: Run selected performance scenario
        env:
          LOCUST_DASHBOARD_UIDS: ${{ env.LOCUST_DASHBOARD_UIDS }}
          LOCUST_SHARE_TOKENS: ${{ env.LOCUST_SHARE_TOKENS }}
          LOCUST_HOT_DASHBOARD_UID: ${{ env.LOCUST_HOT_DASHBOARD_UID }}
          LOCUST_HOT_SHARE_TOKEN: ${{ env.LOCUST_HOT_SHARE_TOKEN }}
          LOCUST_CONFLICT_USER_LOGIN: ${{ env.LOCUST_CONFLICT_USER_LOGIN }}
          LOCUST_WARMUP_REQUESTS: 3
          LOCUST_BREAKDOWN_WARMUP_REQUESTS: 2
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          locust -f "$PERF_LOCUST_FILE"             --host http://localhost:8000             --headless             -u "$PERF_USERS" -r "$PERF_RATE" -t "$PERF_DURATION"             --csv=perf-results/locust             --html=perf-results/locust-report.html

      - name: Wait for metrics sampler
        if: always()
        run: |
          if [ -f perf-results/metrics-sampler.pid ]; then
            pid=$(cat perf-results/metrics-sampler.pid)
            if kill -0 "$pid" 2>/dev/null; then
              while kill -0 "$pid" 2>/dev/null; do
                sleep 1
              done
            fi
          fi

      - name: Collect metrics after load
        if: always()
        run: |
          mkdir -p perf-results
          python perf/collect_metrics_snapshot.py             --metrics-url http://localhost:8000/metrics             --output perf-results/metrics-after.json

      - name: Assert performance thresholds
        run: |
          . .venv/bin/activate
          python perf/assert_locust_thresholds.py             --csv perf-results/locust_stats.csv             --profile "$PERF_THRESHOLD_PROFILE"

      - name: Collect container logs on failure
        if: failure()
        run: |
          mkdir -p perf-results
          docker compose logs > perf-results/docker-compose.log || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ inputs.scenario }}
          path: perf-results

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true
