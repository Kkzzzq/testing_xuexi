name: Run Performance Tests

on:
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start required services
        run: docker compose up -d --build grafana mysql redis dashboard-hub

      - name: Wait for services
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          endpoints = [
              ("Grafana", "http://localhost:3000/api/health"),
              ("Dashboard Hub", "http://localhost:8000/health"),
          ]

          for name, url in endpoints:
              for attempt in range(60):
                  try:
                      with urllib.request.urlopen(url, timeout=3) as response:
                          payload = json.loads(response.read().decode("utf-8"))
                          status = payload.get("status") or payload.get("database")
                          if status in ("ok", "healthy"):
                              print(f"{name} is ready")
                              break
                  except Exception as exc:
                      print(f"Waiting for {name}... attempt {attempt + 1}/60: {exc}")
                  time.sleep(2)
              else:
                  raise SystemExit(f"{name} did not become ready in time")
          PY

      - name: Create perf dashboard and share link
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone

          github_env = os.environ["GITHUB_ENV"]

          dashboard_payload = {
              "dashboard": {
                  "id": None,
                  "uid": "locust-dashboard",
                  "title": "Locust Dashboard",
                  "timezone": "browser",
                  "schemaVersion": 39,
                  "version": 0,
                  "panels": [],
              },
              "overwrite": True,
          }

          req = urllib.request.Request(
              "http://localhost:3000/api/dashboards/db",
              data=json.dumps(dashboard_payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": "Basic YWRtaW46YWRtaW4=",
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=10) as response:
              dashboard_result = json.loads(response.read().decode("utf-8"))

          dashboard_uid = dashboard_result["uid"]

          expire_at = (datetime.now(timezone.utc) + timedelta(hours=24)).isoformat()
          share_payload = {
              "dashboard_uid": dashboard_uid,
              "expire_at": expire_at,
          }

          req = urllib.request.Request(
              "http://localhost:8000/api/v1/share-links",
              data=json.dumps(share_payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=10) as response:
              share_result = json.loads(response.read().decode("utf-8"))

          with open(github_env, "a", encoding="utf-8") as fh:
              fh.write(f"LOCUST_DASHBOARD_UID={dashboard_uid}\n")
              fh.write(f"LOCUST_SHARE_TOKEN={share_result['token']}\n")
              fh.write("LOCUST_CONFLICT_USER_LOGIN=locust_conflict_user\n")
          PY

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install "locust>=2.31,<3" "gevent>=24.2.1" "zope.event>=5.0" "zope.interface>=7.0"
          python - <<'PY'
          import locust
          import gevent
          import zope.event
          import zope.interface
          print("Locust dependencies installed successfully")
          PY

      - name: Run Locust headless
        env:
          LOCUST_DASHBOARD_UID: ${{ env.LOCUST_DASHBOARD_UID }}
          LOCUST_SHARE_TOKEN: ${{ env.LOCUST_SHARE_TOKEN }}
          LOCUST_CONFLICT_USER_LOGIN: ${{ env.LOCUST_CONFLICT_USER_LOGIN }}
        run: |
          . .venv/bin/activate
          mkdir -p perf-results
          locust -f perf/locustfile.py \
            --host http://localhost:8000 \
            --headless \
            -u 20 -r 5 -t 3m \
            --csv=perf-results/locust

      - name: Collect container logs on failure
        if: failure()
        run: |
          mkdir -p perf-results
          docker compose logs > perf-results/docker-compose.log || true

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf-results

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true
