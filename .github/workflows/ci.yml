name: Run Tests

on:
  workflow_dispatch:
    inputs:
      agent_demo_faults:
        description: "Comma-separated demo faults: subscription_cache_bug,share_link_cache_bug,unknown_dashboard_bypass"
        required: false
        default: "off"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      AGENT_DEMO_FAULTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.agent_demo_faults || 'off' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install host Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Docker Compose version
        run: docker compose version

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre wget
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Cleanup previous containers and reports
        run: |
          docker compose down -v --remove-orphans || true
          sudo rm -rf allure-results allure-report fault_repro_report.md fault_repro_report.json docker-compose.log dashboard_hub_metrics.txt || true
          mkdir -p allure-results allure-report

      - name: Start backend services in background
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AGENT_DEMO_FAULTS: ${{ env.AGENT_DEMO_FAULTS }}
        run: |
          docker compose up -d --build grafana mysql redis dashboard-hub prometheus

      - name: Build test-runner image
        run: docker compose build test-runner

      - name: Run tests in test-runner
        id: run_tests
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AGENT_DEMO_FAULTS: ${{ env.AGENT_DEMO_FAULTS }}
        run: docker compose run --rm test-runner

      - name: Collect docker compose logs
        if: always()
        run: docker compose logs --no-color > docker-compose.log || true

      - name: Collect Dashboard Hub metrics snapshot
        if: always()
        run: |
          curl -s http://127.0.0.1:8000/metrics > dashboard_hub_metrics.txt || true

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color || true

      - name: Fix report directory permissions
        if: always()
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" allure-results allure-report 2>/dev/null || true
          mkdir -p allure-results allure-report

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results -o allure-report --clean
          else
            mkdir -p allure-report
            printf '%s\n' '# No allure results generated' > allure-report/index.html
          fi
          
      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Run fault reproduction agent
        if: always()
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: https://api.deepseek.com/v1
          AI_MODEL: deepseek-chat
          AI_PROMPT_VERSION: v1
          AI_PROVIDER: deepseek
          ALLURE_RESULTS_DIR: allure-results
          FAULT_REPRO_MD_FILE: fault_repro_report.md
          FAULT_REPRO_JSON_FILE: fault_repro_report.json
          GRAFANA_BASE_URL: http://127.0.0.1:3000
          DASHBOARD_HUB_BASE_URL: http://127.0.0.1:8000
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3307
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_DB: dashboard_hub
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DB: 0
        run: python tools/ai_test_analyzer.py

      - name: Upload fault reproduction reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fault-repro-report
          path: |
            fault_repro_report.md
            fault_repro_report.json
            docker-compose.log
            dashboard_hub_metrics.txt
          if-no-files-found: warn

      - name: Publish Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Final cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true
