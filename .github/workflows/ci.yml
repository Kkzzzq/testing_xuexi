name: Run Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre wget
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Cleanup previous containers and reports
        run: |
          docker compose down -v --remove-orphans || true
          sudo rm -rf allure-results allure-report ai_analysis_report.md || true

      - name: Run tests with Docker Compose
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: docker compose up --build --exit-code-from test-runner

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Fix report directory permissions
        if: always()
        run: |
          sudo chown -R "$(id -u)":"$(id -g)" allure-results allure-report 2>/dev/null || true
          mkdir -p allure-results allure-report

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results -o allure-report --clean
          else
            mkdir -p allure-report
            printf '%s\n' '# No allure results generated' > allure-report/index.html
          fi

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Run AI test analyzer
        if: always()
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: https://api.deepseek.com/v1
          AI_MODEL: deepseek-chat
          ALLURE_RESULTS_DIR: allure-results
          AI_ANALYSIS_REPORT_FILE: ai_analysis_report.md
        run: python tools/ai_test_analyzer.py

      - name: Upload AI analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-report
          path: ai_analysis_report.md

      - name: Publish Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Final cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true
