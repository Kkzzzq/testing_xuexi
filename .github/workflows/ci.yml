name: Run PyTests

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre wget
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Cleanup previous containers and reports
        run: |
          docker compose down -v --remove-orphans || true
          rm -rf allure-results allure-report || true

      - name: Run tests with Docker Compose
        run: docker compose up --build --exit-code-from test-runner

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results -o allure-report --clean
          else
            mkdir -p allure-report
            cat <<'EOF' > allure-report/index.html
            <h1>No allure results generated</h1>
            EOF
          fi

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Publish Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Final cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true
